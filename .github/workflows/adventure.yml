name: Play Git Adventure

on:
  issues:
    types: [opened]

jobs:
  play:
    # Only runs when issues are opened starting with "Adventure:"
    if: startsWith(github.event.issue.title, 'Adventure:')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run Adventure Game Script
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          PLAYER_NAME: ${{ github.event.issue.user.login }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python play_adventure.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md adventure_state.json
          git commit -m "Adventure turn played by @${{ github.event.issue.user.login }}" || exit 0
          git push

      - name: Close Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment $ISSUE_NUMBER --body "Thanks for playing, @${{ github.event.issue.user.login }}! The adventure map has been updated. Visit my profile to see the changes!"
          gh issue close $ISSUE_NUMBER
